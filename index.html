<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Townbelt — Profile</title>

    <!-- Link-preview tags. These are static; for per-profile unfurls you'd
         render them server-side. Client JS can't change them after a crawler
         reads the HTML. -->
    <meta property="og:title" content="Join me on Townbelt" />
    <meta property="og:description" content="Word of mouth friendship." />
    <meta property="og:type" content="profile" />

    <style>
      /* ----------------------------------------------------------------
         Tokens lifted from src/constants/theme.ts so this matches the app.
         ---------------------------------------------------------------- */
      :root {
        --brand-primary: #2e7d32;

        /* light scheme */
        --text: #000000;
        --text-secondary: #6c6c70;
        --card-bg: #ffffff;
        --elevated: #ffffff; /* avatar ring + online-dot border */
        --skeleton: #d9dee7;
        --screen-gradient: linear-gradient(180deg, #eef3ff 0%, #f2eeff 100%);
        --banner-gradient: linear-gradient(135deg, #2e7d32 0%, #4ca84f 55%, #a6d6a8 100%);
        --card-shadow: 0 18px 50px rgba(20, 30, 60, 0.16);
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --text: #ffffff;
          --text-secondary: #98989f;
          --card-bg: #1c1c1e;
          --elevated: #1c1c1e;
          --skeleton: #22232a;
          --screen-gradient: linear-gradient(180deg, #0d0d14 0%, #0f0f1e 100%);
          --banner-gradient: linear-gradient(135deg, #143b17 0%, #1f5c2a 50%, #2e7d32 100%);
          --card-shadow: 0 18px 50px rgba(0, 0, 0, 0.55);
        }
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        margin: 0;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Rounded",
          "SF Pro Text", system-ui, "Segoe UI", Roboto, Helvetica, Arial,
          sans-serif;
        background: var(--screen-gradient);
        color: var(--text);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        padding: 24px;
        min-height: 100dvh;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }

      /* The hero card ------------------------------------------------- */
      .card {
        width: 100%;
        max-width: 360px;
        background: var(--card-bg);
        border-radius: 24px;
        overflow: hidden;
        box-shadow: var(--card-shadow);
        display: flex;
        flex-direction: column;
        align-items: center;
        padding-bottom: 24px;
      }

      .banner {
        width: 100%;
        height: 140px;
        background: var(--banner-gradient);
        background-size: cover;
        background-position: center;
      }

      .avatar-wrap {
        position: relative;
        margin-top: -42px;
        margin-bottom: 4px;
      }

      .avatar {
        width: 84px;
        height: 84px;
        border-radius: 50%;
        border: 4px solid var(--elevated);
        background: linear-gradient(135deg, #4ca84f 0%, #2e7d32 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        color: #ffffff;
        font-size: 32px;
        font-weight: 600;
        letter-spacing: -0.5px;
        overflow: hidden;
      }

      .avatar img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .online-dot {
        position: absolute;
        bottom: 2px;
        right: 2px;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: var(--brand-primary);
        border: 3px solid var(--elevated);
      }

      .name {
        font-size: 24px;
        font-weight: 700;
        letter-spacing: -0.5px;
        margin: 2px 0 0;
        padding: 0 24px;
        text-align: center;
      }

      .bio {
        font-size: 14px;
        line-height: 20px;
        color: var(--text-secondary);
        text-align: center;
        padding: 4px 24px 0;
        margin: 0;
        min-height: 0;
      }

      .invite-btn {
        margin-top: 14px;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: var(--brand-primary);
        color: #ffffff;
        font-size: 15px;
        font-weight: 600;
        padding: 10px 24px;
        border-radius: 22px;
        border: none;
        text-decoration: none;
        cursor: pointer;
        transition: opacity 0.15s ease, transform 0.05s ease;
      }

      .invite-btn:hover {
        opacity: 0.92;
      }
      .invite-btn:active {
        transform: scale(0.98);
      }
      .invite-btn svg {
        width: 16px;
        height: 16px;
        fill: #ffffff;
      }

      /* Loading shimmer while the profile resolves -------------------- */
      .card.loading .banner {
        background: var(--skeleton);
      }
      .card.loading .avatar {
        background: var(--skeleton);
      }
      .card.loading .name,
      .card.loading .bio {
        color: transparent;
        background: var(--skeleton);
        border-radius: 8px;
        margin-inline: 24px;
        min-width: 120px;
      }
      /* Accept stays inert until the profile has resolved. */
      .card.loading .invite-btn {
        pointer-events: none;
        opacity: 0.5;
      }

      /* Footer: copyright + legal ------------------------------------- */
      .legal {
        font-size: 12px;
        line-height: 18px;
        color: var(--text-secondary);
        text-align: center;
        max-width: 360px;
      }
      .legal a {
        color: var(--text-secondary);
        text-decoration: none;
        border-bottom: 1px solid currentColor;
        padding-bottom: 1px;
      }
      .legal a:hover {
        color: var(--text);
      }
      .legal .sep {
        opacity: 0.5;
        margin: 0 6px;
      }
    </style>
  </head>

  <body>
    <main class="card loading" id="card">
      <div class="banner" id="banner"></div>

      <div class="avatar-wrap">
        <div class="avatar" id="avatar"></div>
        <span class="online-dot"></span>
      </div>

      <h1 class="name" id="name">Loading</h1>
      <p class="bio" id="bio"></p>

      <a class="invite-btn" id="cta" href="#">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path
            d="M9 11.5a4 4 0 1 0 0-8 4 4 0 0 0 0 8Zm0 1.5c-3.6 0-7 1.9-7 4.4 0 .9.7 1.6 1.6 1.6h9.2c-.2-.5-.3-1-.3-1.6 0-1.7.7-3.2 1.9-4.2A11.6 11.6 0 0 0 9 13Zm10 1.2c.5 0 .9.4.9.9v2h2c.5 0 .9.4.9.9s-.4.9-.9.9h-2v2c0 .5-.4.9-.9.9s-.9-.4-.9-.9v-2h-2c-.5 0-.9-.4-.9-.9s.4-.9.9-.9h2v-2c0-.5.4-.9.9-.9Z"
          />
        </svg>
        <span id="cta-label">Get Townbelt</span>
      </a>
    </main>

    <footer class="legal">
      <span id="copyright">© Townbelt</span>
      <span class="sep">·</span>
      <a href="/privacy">Privacy</a>
    </footer>

    <script>
      // ================================================================
      // CONFIG — edit these three when you deploy.
      // The anon "publishable" key is safe to ship in client code; it only
      // grants whatever your RLS policies allow. See the RLS note below.
      // ================================================================
      const SUPABASE_URL = "https://cskhaxtuuygkywygjcqw.supabase.co";
      const SUPABASE_ANON_KEY =
        "sb_publishable_lm5g9KF8BRjvVoD81nbkeQ_p8BUtTVP";

      // Where "Get Townbelt" sends people. Swap for your App Store / TestFlight
      // URL. The invited user's id is appended as ?ref= so you can attribute
      // later if you add deferred deep linking.
      const APP_LINK = "https://apps.apple.com/app/idXXXXXXXXXX";

      // Reads come through the get_public_profile(id) RPC (migration 0014).
      // It returns only the safe columns for a single id — anon has no table
      // access and can't enumerate the user list. phone/email never leave the
      // database.

      const params = new URLSearchParams(location.search);
      // Accept either a pretty path (/p/<uuid>) or a query param (?u=<uuid>).
      // The path segment only counts if it looks like a UUID, so serving the
      // file at /profile-card.html still falls through to ?u=.
      const lastSeg = location.pathname.split("/").filter(Boolean).pop() || "";
      const pathId = /^[0-9a-f-]{36}$/i.test(lastSeg) ? lastSeg : null;
      const userId = params.get("u") || pathId;

      const els = {
        card: document.getElementById("card"),
        banner: document.getElementById("banner"),
        avatar: document.getElementById("avatar"),
        name: document.getElementById("name"),
        bio: document.getElementById("bio"),
        cta: document.getElementById("cta"),
        ctaLabel: document.getElementById("cta-label"),
        copyright: document.getElementById("copyright"),
      };

      els.copyright.textContent = "© " + new Date().getFullYear() + " Townbelt";

      function initials(fullName) {
        const parts = (fullName || "").trim().split(/\s+/).filter(Boolean);
        if (!parts.length) return "?";
        return (parts[0][0] + (parts[1]?.[0] || "")).toUpperCase();
      }

      function render(profile, ctaLabel = "Accept friend request") {
        const fullName = profile.full_name || profile.name || "Someone";

        document.title = fullName + " — Townbelt";
        els.name.textContent = fullName;

        if (profile.bio) {
          els.bio.textContent = profile.bio;
        } else {
          els.bio.remove();
        }

        if (profile.avatar_url) {
          const img = document.createElement("img");
          img.src = profile.avatar_url;
          img.alt = fullName;
          els.avatar.replaceChildren(img);
        } else {
          els.avatar.textContent = initials(fullName);
        }

        if (profile.banner_url) {
          els.banner.style.backgroundImage = "url('" + profile.banner_url + "')";
        }

        els.ctaLabel.textContent = ctaLabel;
        els.cta.href =
          APP_LINK + (profile.id ? "?ref=" + encodeURIComponent(profile.id) : "");

        els.card.classList.remove("loading");
      }

      // Fallback when there's no ?u= or the fetch fails. A ?name=…&bio=… query
      // still renders that (handy for design tests); otherwise we brand the
      // card as Townbelt itself so the link always lands somewhere coherent.
      function renderFromParams() {
        const name = params.get("name");
        if (name) {
          render({
            id: userId || "",
            full_name: name,
            name: name,
            bio: params.get("bio"),
            avatar_url: params.get("avatar"),
            banner_url: params.get("banner"),
          });
        } else {
          render(
            {
              id: "",
              full_name: "Townbelt",
              name: "Townbelt",
              bio: "Word of mouth friendship.",
            },
            "Join Townbelt",
          );
        }
      }

      async function load() {
        if (!userId) return renderFromParams();
        try {
          const res = await fetch(
            SUPABASE_URL + "/rest/v1/rpc/get_public_profile",
            {
              method: "POST",
              headers: {
                apikey: SUPABASE_ANON_KEY,
                Authorization: "Bearer " + SUPABASE_ANON_KEY,
                "Content-Type": "application/json",
              },
              body: JSON.stringify({ profile_id: userId }),
            },
          );
          if (!res.ok) throw new Error("HTTP " + res.status);
          const rows = await res.json();
          if (rows && rows.length) return render(rows[0]);
          renderFromParams(); // unknown id → generic card
        } catch (err) {
          console.error("Profile fetch failed:", err);
          renderFromParams();
        }
      }

      load();
    </script>
  </body>
</html>
